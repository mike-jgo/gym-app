<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FBEOD">
<meta name="theme-color" content="#0a0a0f">
<title>FBEOD Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #14141f;
    --surface2: #1c1c2e;
    --border: #2a2a40;
    --text: #e8e8f0;
    --text-dim: #7a7a95;
    --accent-a: #ff6b4a;
    --accent-a-dim: rgba(255,107,74,0.15);
    --accent-b: #4aadff;
    --accent-b-dim: rgba(74,173,255,0.15);
    --green: #4aff8b;
    --green-dim: rgba(74,255,139,0.12);
    --red: #ff4a6a;
    --yellow: #ffd24a;
    --radius: 14px;
    --accent: var(--accent-a);
    --accent-dim: var(--accent-a-dim);
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Outfit', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    padding: var(--safe-top) 16px calc(var(--safe-bottom) + 16px);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0 20px;
  }
  .header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px;
  }
  .header h1 span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .bw-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; color: var(--text-dim);
    background: var(--surface); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 20px;
  }
  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s;
  }
  .sync-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green-dim); }
  .sync-dot.error { background: var(--red); }
  .sync-dot.syncing { background: var(--yellow); animation: pulse-dot 0.8s ease infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Setup Banner */
  .setup-banner {
    background: var(--surface); border: 1px solid var(--yellow);
    border-radius: var(--radius); padding: 16px;
    margin-bottom: 20px; display: none;
  }
  .setup-banner.show { display: block; }
  .setup-banner h3 {
    font-size: 0.9rem; color: var(--yellow); margin-bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
  }
  .setup-banner p { font-size: 0.82rem; color: var(--text-dim); line-height: 1.5; margin-bottom: 10px; }
  .setup-input {
    width: 100%; padding: 10px 12px; border-radius: 10px;
    border: 1.5px solid var(--border); background: var(--surface2);
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem; margin-bottom: 8px;
  }
  .setup-input:focus { outline: none; border-color: var(--yellow); }
  .setup-save {
    padding: 10px 20px; border-radius: 10px; border: none;
    background: var(--yellow); color: var(--bg);
    font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.85rem;
    cursor: pointer;
  }
  .setup-save:active { transform: scale(0.97); }

  /* Workout Toggle */
  .toggle-row {
    display: flex; gap: 10px; margin-bottom: 20px;
  }
  .toggle-btn {
    flex: 1; padding: 14px; border-radius: var(--radius);
    font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700;
    border: 2px solid var(--border); background: var(--surface);
    color: var(--text-dim); cursor: pointer; transition: all 0.25s ease;
    letter-spacing: 0.5px;
  }
  .toggle-btn.active {
    border-color: var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
    box-shadow: 0 0 20px var(--accent-dim);
  }

  /* Timer Bar */
  .timer-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; position: relative; overflow: hidden;
  }
  .timer-bar::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: var(--timer-pct, 0%);
    background: var(--accent-dim);
    transition: width 1s linear;
  }
  .timer-bar > * { position: relative; z-index: 1; }
  .timer-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.6rem; font-weight: 700;
  }
  .timer-display.alert { color: var(--green); animation: pulse 0.5s ease 3; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .timer-btn {
    padding: 10px 20px; border-radius: 10px;
    font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.9rem;
    border: none; cursor: pointer; transition: all 0.2s;
  }
  .timer-btn.start { background: var(--accent); color: var(--bg); }
  .timer-btn.stop { background: var(--red); color: #fff; }
  .timer-btn:active { transform: scale(0.95); }

  /* Exercise Cards */
  .exercise-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px;
    margin-bottom: 14px;
    transition: border-color 0.3s;
  }
  .exercise-card:has(input:focus) { border-color: var(--accent); }

  .ex-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 14px;
  }
  .ex-name {
    font-weight: 700; font-size: 1.05rem; line-height: 1.3;
    flex: 1; padding-right: 10px;
  }
  .ex-1rm {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem; color: var(--text-dim);
    background: var(--surface2); border-radius: 8px;
    padding: 4px 10px; white-space: nowrap;
  }
  .ex-1rm strong { color: var(--yellow); }

  .last-lift {
    font-size: 0.78rem; color: var(--text-dim);
    margin-bottom: 12px; padding: 6px 10px;
    background: var(--surface2); border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
  }
  .last-lift em { font-style: normal; color: var(--accent); }

  .sets-grid {
    display: grid; grid-template-columns: auto 1fr 1fr;
    gap: 8px; align-items: center;
  }
  .set-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem; color: var(--text-dim);
    font-weight: 600;
  }
  .set-input {
    width: 100%; padding: 12px 10px; border-radius: 10px;
    border: 1.5px solid var(--border); background: var(--surface2);
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem; font-weight: 600; text-align: center;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .set-input:focus { outline: none; border-color: var(--accent); background: var(--accent-dim); }
  .set-input::placeholder { color: var(--text-dim); font-weight: 400; font-size: 0.8rem; }

  /* Footer Actions */
  .footer-actions {
    display: flex; gap: 10px; margin-top: 24px; padding-bottom: 20px;
  }
  .action-btn {
    flex: 1; padding: 16px; border-radius: var(--radius);
    font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.95rem;
    border: 2px solid var(--border); background: var(--surface);
    color: var(--text); cursor: pointer; transition: all 0.2s;
  }
  .action-btn:active { transform: scale(0.97); }
  .action-btn.save { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .action-btn.export { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .action-btn.clear { border-color: var(--red); color: var(--red); }

  /* Toast */
  .toast {
    position: fixed; bottom: calc(var(--safe-bottom) + 24px);
    left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--green); color: var(--bg);
    padding: 12px 24px; border-radius: 12px;
    font-weight: 700; font-size: 0.9rem;
    opacity: 0; transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
    z-index: 100; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--red); color: #fff; }

  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<div class="header">
  <h1>FBEOD <span id="workoutLabel">A</span></h1>
  <div class="header-right">
    <span class="bw-badge">BW 64.5 kg</span>
    <div class="sync-dot" id="syncDot" title="Google Sheets sync status"></div>
  </div>
</div>

<!-- Setup Banner (shown if no API URL configured) -->
<div class="setup-banner" id="setupBanner">
  <h3>⚡ CONNECT GOOGLE SHEETS</h3>
  <p>Paste your Google Apps Script Web App URL below to enable cloud sync. See the setup guide for instructions.</p>
  <input class="setup-input" id="apiUrlInput" placeholder="https://script.google.com/macros/s/...../exec">
  <button class="setup-save" onclick="saveApiUrl()">CONNECT</button>
</div>

<div class="toggle-row">
  <button class="toggle-btn active" id="btnA" onclick="switchWorkout('A')">WORKOUT A</button>
  <button class="toggle-btn" id="btnB" onclick="switchWorkout('B')">WORKOUT B</button>
</div>

<div class="timer-bar" id="timerBar">
  <span class="timer-display" id="timerDisplay">1:30</span>
  <button class="timer-btn start" id="timerBtn" onclick="toggleTimer()">REST</button>
</div>

<div id="exerciseList"></div>

<div class="footer-actions">
  <button class="action-btn save" onclick="saveSession()">SAVE</button>
  <button class="action-btn export" onclick="exportSession()">EXPORT</button>
  <button class="action-btn clear" onclick="clearSession()">CLEAR</button>
</div>

<div class="toast" id="toast"></div>

<script>
// =====================================================
// CONFIG
// =====================================================
const WORKOUTS = {
  A: [
    { id: 'bb_bench',    name: 'Barbell Bench Press',      sets: 4 },
    { id: 'sm_squat',    name: 'Smith Machine Squat',      sets: 4 },
    { id: 'lat_pull',    name: 'Lat Pulldown',             sets: 3 },
    { id: 'db_rdl',      name: 'DB Romanian Deadlift',     sets: 3 },
    { id: 'db_lat_raise',name: 'DB Lateral Raise',         sets: 3 },
    { id: 'db_hammer',   name: 'DB Hammer Curls',          sets: 3 },
  ],
  B: [
    { id: 'sm_incline',  name: 'Smith Machine Incline Press', sets: 4 },
    { id: 'bb_row',      name: 'Barbell Row',                 sets: 4 },
    { id: 'db_goblet',   name: 'DB Goblet Squat',             sets: 3 },
    { id: 'db_ohp',      name: 'Seated DB Shoulder Press',    sets: 3 },
    { id: 'sa_lat_pull', name: 'Single-Arm Lat Pulldown',     sets: 3 },
    { id: 'tri_ext',     name: 'Tricep Overhead Extension',   sets: 3 },
  ]
};

let currentWorkout = 'A';
let timerInterval = null;
let timerSeconds = 90;
let timerRunning = false;
let lastLiftCache = {}; // cache of last-lift data from Sheets

// =====================================================
// GOOGLE SHEETS API (via Apps Script)
// =====================================================
function getApiUrl() {
  return localStorage.getItem('fbeod_api_url') || '';
}

function saveApiUrl() {
  const url = document.getElementById('apiUrlInput').value.trim();
  if (!url) return;
  localStorage.setItem('fbeod_api_url', url);
  document.getElementById('setupBanner').classList.remove('show');
  setSyncStatus('syncing');
  // Test connection & load data
  loadLastLifts().then(() => {
    setSyncStatus('connected');
    showToast('Connected to Google Sheets!');
    render();
  }).catch(() => {
    setSyncStatus('error');
    showToast('Connection failed — check URL', true);
  });
}

function checkSetup() {
  const url = getApiUrl();
  if (!url) {
    document.getElementById('setupBanner').classList.add('show');
    setSyncStatus('error');
  } else {
    setSyncStatus('syncing');
    loadLastLifts().then(() => {
      setSyncStatus('connected');
      render();
    }).catch(() => {
      setSyncStatus('error');
    });
  }
}

function setSyncStatus(status) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot';
  if (status === 'connected') dot.classList.add('connected');
  else if (status === 'error') dot.classList.add('error');
  else if (status === 'syncing') dot.classList.add('syncing');
}

// POST workout session to Google Sheets
async function postToSheets(workout, exercisesData) {
  const url = getApiUrl();
  if (!url) throw new Error('No API URL');

  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' }, // Apps Script needs this for CORS
    body: JSON.stringify({
      action: 'save',
      workout: workout,
      date: new Date().toISOString(),
      bodyweight: 64.5,
      exercises: exercisesData
    })
  });
  const result = await response.json();
  if (result.status !== 'ok') throw new Error(result.message || 'Save failed');
  return result;
}

// GET last-lift data from Google Sheets
async function loadLastLifts() {
  const url = getApiUrl();
  if (!url) throw new Error('No API URL');

  const response = await fetch(`${url}?action=lastLifts`);
  const result = await response.json();
  if (result.status === 'ok') {
    lastLiftCache = result.data || {};
  }
  return result;
}

// =====================================================
// LOCAL STORAGE (for current session inputs only)
// =====================================================
function lsKey(exId, set, field) { return `fbeod_${exId}_s${set}_${field}`; }

function saveField(exId, set, field, value) {
  localStorage.setItem(lsKey(exId, set, field), value);
}
function loadField(exId, set, field) {
  return localStorage.getItem(lsKey(exId, set, field)) || '';
}

// =====================================================
// 1RM (Brzycki)
// =====================================================
function calc1RM(w, r) {
  if (!w || w <= 0 || !r || r <= 0 || r > 30) return 0;
  if (r === 1) return w;
  return w * (36 / (37 - r));
}

// =====================================================
// RENDER
// =====================================================
function render() {
  const list = document.getElementById('exerciseList');
  list.innerHTML = '';
  const exercises = WORKOUTS[currentWorkout];

  exercises.forEach(ex => {
    // Use cached last-lift data from Sheets, fall back to localStorage
    const last = lastLiftCache[ex.id] || null;
    const card = document.createElement('div');
    card.className = 'exercise-card';

    let lastHtml = '';
    if (last && last.sets && last.sets.length) {
      const summary = last.sets.map((s, i) => `<em>S${i+1}</em> ${s.w}×${s.r}`).join('  ');
      const dateStr = last.date ? `<span style="opacity:0.5;margin-left:6px">${last.date}</span>` : '';
      lastHtml = `<div class="last-lift">LAST: ${summary}${dateStr}</div>`;
    }

    let setsHtml = '';
    let best1RM = 0;
    for (let s = 1; s <= ex.sets; s++) {
      const w = loadField(ex.id, s, 'w');
      const r = loadField(ex.id, s, 'r');
      const rm = calc1RM(parseFloat(w), parseInt(r));
      if (rm > best1RM) best1RM = rm;
      setsHtml += `
        <span class="set-label">S${s}</span>
        <input class="set-input" inputmode="decimal" placeholder="kg"
          value="${w}" data-ex="${ex.id}" data-set="${s}" data-field="w">
        <input class="set-input" inputmode="decimal" placeholder="reps"
          value="${r}" data-ex="${ex.id}" data-set="${s}" data-field="r">
      `;
    }

    const rmText = best1RM > 0 ? `e1RM <strong>${best1RM.toFixed(1)}</strong>` : 'e1RM —';

    card.innerHTML = `
      <div class="ex-header">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-1rm" id="rm_${ex.id}">${rmText}</div>
      </div>
      ${lastHtml}
      <div class="sets-grid">${setsHtml}</div>
    `;
    list.appendChild(card);
  });

  list.querySelectorAll('.set-input').forEach(input => {
    input.addEventListener('input', handleInput);
  });
}

function handleInput(e) {
  const { ex, set, field } = e.target.dataset;
  saveField(ex, set, field, e.target.value);
  update1RM(ex);
}

function update1RM(exId) {
  const ex = [...WORKOUTS.A, ...WORKOUTS.B].find(e => e.id === exId);
  if (!ex) return;
  let best = 0;
  for (let s = 1; s <= ex.sets; s++) {
    const w = parseFloat(loadField(exId, s, 'w')) || 0;
    const r = parseInt(loadField(exId, s, 'r')) || 0;
    const rm = calc1RM(w, r);
    if (rm > best) best = rm;
  }
  const el = document.getElementById(`rm_${exId}`);
  if (el) el.innerHTML = best > 0 ? `e1RM <strong>${best.toFixed(1)}</strong>` : 'e1RM —';
}

// =====================================================
// WORKOUT TOGGLE
// =====================================================
function switchWorkout(w) {
  currentWorkout = w;
  document.getElementById('workoutLabel').textContent = w;
  document.getElementById('btnA').classList.toggle('active', w === 'A');
  document.getElementById('btnB').classList.toggle('active', w === 'B');
  document.documentElement.style.setProperty('--accent', w === 'A' ? 'var(--accent-a)' : 'var(--accent-b)');
  document.documentElement.style.setProperty('--accent-dim', w === 'A' ? 'var(--accent-a-dim)' : 'var(--accent-b-dim)');
  render();
}

// =====================================================
// TIMER
// =====================================================
function toggleTimer() {
  if (timerRunning) { stopTimer(); } else { startTimer(); }
}
function startTimer() {
  timerSeconds = 90;
  timerRunning = true;
  const btn = document.getElementById('timerBtn');
  const display = document.getElementById('timerDisplay');
  const bar = document.getElementById('timerBar');
  btn.textContent = 'STOP'; btn.className = 'timer-btn stop';
  display.classList.remove('alert');
  timerInterval = setInterval(() => {
    timerSeconds--;
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    display.textContent = `${m}:${s.toString().padStart(2, '0')}`;
    bar.style.setProperty('--timer-pct', `${((90 - timerSeconds) / 90) * 100}%`);
    if (timerSeconds <= 0) {
      stopTimer();
      display.classList.add('alert');
      display.textContent = 'GO!';
      if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
    }
  }, 1000);
}
function stopTimer() {
  clearInterval(timerInterval);
  timerRunning = false; timerSeconds = 90;
  const btn = document.getElementById('timerBtn');
  const display = document.getElementById('timerDisplay');
  const bar = document.getElementById('timerBar');
  btn.textContent = 'REST'; btn.className = 'timer-btn start';
  display.textContent = '1:30'; display.classList.remove('alert');
  bar.style.setProperty('--timer-pct', '0%');
}

// =====================================================
// SAVE SESSION (to Google Sheets)
// =====================================================
async function saveSession() {
  const exercises = WORKOUTS[currentWorkout];
  const exercisesData = [];

  exercises.forEach(ex => {
    const sets = [];
    for (let s = 1; s <= ex.sets; s++) {
      const w = loadField(ex.id, s, 'w');
      const r = loadField(ex.id, s, 'r');
      if (w || r) {
        sets.push({ set: s, weight: parseFloat(w) || 0, reps: parseInt(r) || 0 });
      }
    }
    if (sets.length) {
      const best1RM = Math.max(...sets.map(s => calc1RM(s.weight, s.reps)));
      exercisesData.push({
        id: ex.id,
        name: ex.name,
        sets: sets,
        best1RM: Math.round(best1RM * 10) / 10
      });
    }
  });

  if (!exercisesData.length) {
    showToast('Nothing to save — enter some sets first', true);
    return;
  }

  const apiUrl = getApiUrl();
  if (!apiUrl) {
    showToast('Connect Google Sheets first!', true);
    document.getElementById('setupBanner').classList.add('show');
    return;
  }

  setSyncStatus('syncing');
  try {
    await postToSheets(currentWorkout, exercisesData);
    setSyncStatus('connected');
    showToast('Saved to Google Sheets!');
    // Refresh last-lift cache
    await loadLastLifts();
  } catch (err) {
    setSyncStatus('error');
    showToast('Save failed: ' + err.message, true);
  }
}

// =====================================================
// EXPORT (clipboard)
// =====================================================
function exportSession() {
  const exercises = WORKOUTS[currentWorkout];
  const date = new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
  let text = `FBEOD Workout ${currentWorkout} — ${date}\nBW: 64.5 kg\n${'─'.repeat(30)}\n`;

  exercises.forEach(ex => {
    text += `\n${ex.name}\n`;
    for (let s = 1; s <= ex.sets; s++) {
      const w = loadField(ex.id, s, 'w');
      const r = loadField(ex.id, s, 'r');
      if (w || r) text += `  S${s}: ${w || '—'} kg × ${r || '—'} reps\n`;
    }
  });

  navigator.clipboard.writeText(text).then(() => {
    showToast('Copied to clipboard!');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied to clipboard!');
  });
}

// =====================================================
// CLEAR SESSION
// =====================================================
function clearSession() {
  if (!confirm('Clear all weights/reps for Workout ' + currentWorkout + '?')) return;
  const exercises = WORKOUTS[currentWorkout];
  exercises.forEach(ex => {
    for (let s = 1; s <= ex.sets; s++) {
      localStorage.removeItem(lsKey(ex.id, s, 'w'));
      localStorage.removeItem(lsKey(ex.id, s, 'r'));
    }
  });
  render();
  showToast('Session cleared');
}

// =====================================================
// TOAST
// =====================================================
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2400);
}

// =====================================================
// INIT
// =====================================================
checkSetup();
render();
</script>
</body>
</html>
